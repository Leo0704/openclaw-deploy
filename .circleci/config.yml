# CircleCI 配置
# 用于构建 Lobster Assistant 和 OpenClaw 离线包

version: 2.1

# 环境变量
environment:
  NODE_VERSION: "22.14.0"  # 统一版本
  OPENCLAW_VERSION: "2026.3.11"

# 定义可复用的命令
commands:
  install-deps:
    description: "安装 Node.js 依赖"
    steps:
      - restore_cache:
          keys:
            - v1-deps-{{ .Environment.CIRCLE_JOB }}-{{ checksum "apps/cli/package-lock.json" }}
            - v1-deps-{{ .Environment.CIRCLE_JOB }}-
      - run:
          name: Install dependencies
          command: cd apps/cli && npm install
      - save_cache:
          key: v1-deps-{{ .Environment.CIRCLE_JOB }}-{{ checksum "apps/cli/package-lock.json" }}
          paths:
            - apps/cli/node_modules

  build-typescript:
    description: "编译 TypeScript"
    steps:
      - run:
          name: Build TypeScript
          command: cd apps/cli && npm run build

  # build-macos-app 命令已废弃，直接在 job 内调用

# 定义 jobs
jobs:
  # ============================================
  # 构建 Lobster Assistant (跨平台打包)
  # ============================================

  build-lobster-macos-arm64:
    macos:
      xcode: "15.0"
    steps:
      - checkout
      - install-deps
      - build-typescript
      - run:
          name: Build binary
          command: |
            cd apps/cli
            npx @yao-pkg/pkg dist/index.js --targets node22-macos-arm64 --output bin/lobster-macos-arm64
      - run:
          name: Build App Bundle
          command: |
            VERSION=$(node -p "require('./package.json').version")
            chmod +x ../scripts/build-macos-app.sh
            ../scripts/build-macos-app.sh bin/lobster-macos-arm64 bin/lobster-macos-arm64-app.zip "${VERSION}"
      - persist_to_workspace:
          root: apps/cli/bin
          paths:
            - lobster-macos-arm64
            - lobster-macos-arm64-app.zip

  build-lobster-linux:
    docker:
      - image: cimg/node:22.14
    steps:
      - checkout
      - install-deps
      - build-typescript
      - run:
          name: Build binary
          command: |
            cd apps/cli
            npx @yao-pkg/pkg dist/index.js --targets node22-linux-x64 --output bin/lobster-linux-x64
            chmod +x bin/lobster-linux-x64
      - persist_to_workspace:
          root: apps/cli/bin
          paths:
            - lobster-linux-x64

  build-lobster-windows:
    machine:
      image: windows-server-2022
    steps:
      - checkout
      - run:
          name: Setup Node.js
          command: |
            choco install nodejs --version=22.14.0 -y
      - install-deps
      - build-typescript
      - run:
          name: Build binary
          command: |
            cd apps/cli
            npx @yao-pkg/pkg dist/index.js --targets node22-win-x64 --output bin/lobster-win-x64.exe
      - persist_to_workspace:
          root: apps/cli/bin
          paths:
            - lobster-win-x64.exe

  # ============================================
  # 构建 OpenClaw 离线包
  # ============================================

  build-openclaw-win:
    machine:
      image: windows-server-2022
    steps:
      - checkout
      - run:
          name: Setup Node.js & pnpm
          command: |
            choco install nodejs --version=22.14.0 -y
            npm exec --yes pnpm@10
      - run:
          name: Clone OpenClaw
          command: |
            git clone --depth 1 --branch v${OPENCLAW_VERSION} https://github.com/openclaw/openclaw.git openclaw || \
            git clone --depth 1 https://github.com/openclaw/openclaw.git openclaw
      - run:
          name: Install & Build OpenClaw
          command: |
            cd openclaw
            pnpm install --frozen-lockfile || pnpm install
            pnpm build
      - run:
          name: Download Node.js for bundle
          command: |
            # 直接下载 Node.js zip，避免路径问题
            Invoke-WebRequest -Uri "https://nodejs.org/dist/v22.14.0/node-v22.14.0-win-x64.zip" -OutFile "node.zip"
            Expand-Archive -Path "node.zip" -DestinationPath "node" -Force
            New-Item -ItemType Directory -Path "bundle/node" -Force | Out-Null
            Move-Item -Path "node\node-v22.14.0-win-x64\*" -Destination "bundle\node\" -Force
      - run:
          name: Create bundle
          command: |
            New-Item -ItemType Directory -Path "bundle/openclaw" -Force | Out-Null
            # 使用 robocopy 复制（更快更可靠）
            robocopy openclaw bundle/openclaw /E /XD .git /NFL /NDL /NJH /NJS
            # 验证文件数量
            $count = (Get-ChildItem -Path bundle/openclaw -Recurse -File).Count
            Write-Host "Copied $count files"
      - run:
          name: Create start.bat
          command: |
            $batContent = @"
            @echo off
            chcp 65001 >nul
            setlocal
            set "SCRIPT_DIR=%~dp0"
            set "NODE_DIR=%SCRIPT_DIR%node\"
            set "OPENCLAW_DIR=%SCRIPT_DIR%openclaw\"
            set "PATH=%NODE_DIR%;%PATH%"
            cd /d "%OPENCLAW_DIR%"
            echo Starting OpenClaw...
            "%NODE_DIR%node.exe" openclaw.mjs gateway run --port 18789 --allow-unconfigured %*
            "@
            $batContent | Out-File -FilePath bundle/start.bat -Encoding utf8BOM
      - run:
          name: Create VERSION file
          command: |
            "openclaw: ${OPENCLAW_VERSION}" | Out-File bundle/VERSION -Encoding utf8
            "node: 22.14.0" | Add-Content bundle/VERSION
            "platform: win-x64" | Add-Content bundle/VERSION
            "build_date: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" | Add-Content bundle/VERSION
      - run:
          name: Create archive
          command: |
            # Windows 上使用 tar 打包（避免 zip 的 2GB 限制）
            cd bundle
            tar -czvf "../openclaw-win-x64-${OPENCLAW_VERSION}.tar.gz" *
      - persist_to_workspace:
          root: .
          paths:
            - openclaw-win-x64-*.tar.gz

  build-openclaw-macos:
    macos:
      xcode: "15.0"
    steps:
      - checkout
      - run:
          name: Setup Node.js & pnpm
          command: |
            # macOS 使用 Homebrew 安装
            brew install node@22
            brew link node@22 --force
            npm exec --yes pnpm@10
      - run:
          name: Clone OpenClaw
          command: |
            git clone --depth 1 --branch v${OPENCLAW_VERSION} https://github.com/openclaw/openclaw.git openclaw || \
            git clone --depth 1 https://github.com/openclaw/openclaw.git openclaw
      - run:
          name: Install & Build OpenClaw
          command: |
            cd openclaw
            pnpm install --frozen-lockfile || pnpm install
            pnpm build
      - run:
          name: Download Node.js
          command: |
            curl -LO https://nodejs.org/dist/v22.14.0/node-v22.14.0-darwin-arm64.tar.gz
            tar -xzf node-v22.14.0-darwin-arm64.tar.gz
            mkdir -p bundle/node
            cp -R node-v22.14.0-darwin-arm64/* bundle/node/
      - run:
          name: Create bundle
          command: |
            mkdir -p bundle/openclaw
            rsync -av --exclude='.git' openclaw/ bundle/openclaw/
      - run:
          name: Create start.sh
          command: |
            cat > bundle/start.sh \<<'EOF'
            #!/bin/bash
            SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
            export PATH="$SCRIPT_DIR/node/bin:$PATH"
            cd "$SCRIPT_DIR/openclaw"
            echo "Starting OpenClaw..."
            "$SCRIPT_DIR/node/bin/node" openclaw.mjs gateway run --port 18789 --allow-unconfigured "$@"
            EOF
            chmod +x bundle/start.sh
      - run:
          name: Create VERSION file
          command: |
            echo "openclaw: ${OPENCLAW_VERSION}" > bundle/VERSION
            echo "node: 22.14.0" >> bundle/VERSION
            echo "platform: macos-arm64" >> bundle/VERSION
            echo "build_date: $(date '+%Y-%m-%d %H:%M:%S')" >> bundle/VERSION
      - run:
          name: Create archive
          command: |
            cd bundle
            tar -czvf ../openclaw-macos-arm64-${OPENCLAW_VERSION}.tar.gz *
      - persist_to_workspace:
          root: .
          paths:
            - openclaw-macos-arm64-*.tar.gz

  build-openclaw-linux:
    docker:
      - image: cimg/node:22.14
    steps:
      - checkout
      - run:
          name: Setup pnpm
          command: npm exec --yes pnpm@10
      - run:
          name: Clone OpenClaw
          command: |
            git clone --depth 1 --branch v${OPENCLAW_VERSION} https://github.com/openclaw/openclaw.git openclaw || \
            git clone --depth 1 https://github.com/openclaw/openclaw.git openclaw
      - run:
          name: Install & Build OpenClaw
          command: |
            cd openclaw
            pnpm install --frozen-lockfile || pnpm install
            pnpm build
      - run:
          name: Download Node.js
          command: |
            curl -LO https://nodejs.org/dist/v22.14.0/node-v22.14.0-linux-x64.tar.gz
            tar -xzf node-v22.14.0-linux-x64.tar.gz
            mkdir -p bundle/node
            cp -R node-v22.14.0-linux-x64/* bundle/node/
      - run:
          name: Create bundle
          command: |
            mkdir -p bundle/openclaw
            rsync -av --exclude='.git' openclaw/ bundle/openclaw/
      - run:
          name: Create start.sh
          command: |
            cat > bundle/start.sh \<<'EOF'
            #!/bin/bash
            SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
            export PATH="$SCRIPT_DIR/node/bin:$PATH"
            cd "$SCRIPT_DIR/openclaw"
            echo "Starting OpenClaw..."
            "$SCRIPT_DIR/node/bin/node" openclaw.mjs gateway run --port 18789 --allow-unconfigured "$@"
            EOF
            chmod +x bundle/start.sh
      - run:
          name: Create VERSION file
          command: |
            echo "openclaw: ${OPENCLAW_VERSION}" > bundle/VERSION
            echo "node: 22.14.0" >> bundle/VERSION
            echo "platform: linux-x64" >> bundle/VERSION
            echo "build_date: $(date '+%Y-%m-%d %H:%M:%S')" >> bundle/VERSION
      - run:
          name: Create archive
          command: |
            cd bundle
            tar -czvf ../openclaw-linux-x64-${OPENCLAW_VERSION}.tar.gz *
      - persist_to_workspace:
          root: .
          paths:
            - openclaw-linux-x64-*.tar.gz

# 定义 workflows
workflows:
  version: 2

  # 构建 Lobster Assistant - 只在 tag 时触发
  build-lobster:
    jobs:
      - build-lobster-macos-arm64:
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+$/
            branches:
              ignore: /.*/
      - build-lobster-linux:
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+$/
            branches:
              ignore: /.*/
      - build-lobster-windows:
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+$/
            branches:
              ignore: /.*/

  # 构建 OpenClaw 离线包
  # 构建 OpenClaw 离线包 - 只在 tag 时触发
  build-openclaw-bundle:
    jobs:
      - build-openclaw-win:
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+$/
            branches:
              ignore: /.*/
      - build-openclaw-macos:
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+$/
            branches:
              ignore: /.*/
      - build-openclaw-linux:
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+$/
            branches:
              ignore: /.*/
