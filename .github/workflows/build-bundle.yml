name: Build OpenClaw Bundle

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenClaw version (e.g., 2026.3.8)'
        required: true
        default: '2026.3.8'
      node_version:
        description: 'Node.js version'
        required: true
        default: '22.14.0'
  workflow_call:
    inputs:
      version:
        description: 'OpenClaw version'
        required: true
        type: string
      node_version:
        description: 'Node.js version'
        required: false
        type: string
        default: '22.14.0'

env:
  OPENCLAW_REPO: 'https://github.com/openclaw/openclaw.git'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: win-x64
            runner: windows-latest
          - platform: macos-arm64
            runner: macos-latest
          - platform: linux-x64
            runner: ubuntu-latest

    steps:
      - name: Checkout lobster
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ github.event.inputs.node_version || inputs.node_version || '22.14.0' }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get version info
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version || inputs.version || '2026.3.8' }}"
          NODE_VER="${{ github.event.inputs.node_version || inputs.node_version || '22.14.0' }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "node_version=${NODE_VER}" >> $GITHUB_OUTPUT

      - name: Clone OpenClaw (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          git clone --depth 1 --branch "v${VERSION}" ${{ env.OPENCLAW_REPO }} openclaw 2>$null
          if (!(Test-Path openclaw)) { git clone --depth 1 ${{ env.OPENCLAW_REPO }} openclaw }

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Set-Location openclaw
          pnpm install --frozen-lockfile 2>$null; if ($LASTEXITCODE) { pnpm install }

      - name: Build OpenClaw (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Set-Location openclaw
          pnpm build

      - name: Clone OpenClaw (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git clone --depth 1 --branch "v${VERSION}" ${{ env.OPENCLAW_REPO }} openclaw || \
          git clone --depth 1 ${{ env.OPENCLAW_REPO }} openclaw

      - name: Install dependencies (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd openclaw
          pnpm install --frozen-lockfile || pnpm install

      - name: Build OpenClaw (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd openclaw
          pnpm build

      - name: Download Node.js (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        env:
          NODE_VERSION: ${{ steps.version.outputs.node_version }}
        run: |
          $env:NODE_VERSION = "${{ steps.version.outputs.node_version }}"
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v${env:NODE_VERSION}/node-v${env:NODE_VERSION}-win-x64.zip" -OutFile "node.zip"
          Expand-Archive -Path "node.zip" -DestinationPath "." -Force
          New-Item -ItemType Directory -Path "bundle/node" -Force
          Move-Item -Path "node-v${env:NODE_VERSION}-win-x64\*" -Destination "bundle/node/" -Force

      - name: Download Node.js (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        env:
          NODE_VERSION: ${{ steps.version.outputs.node_version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          if [ "$PLATFORM" = "macos-arm64" ]; then
            ARCH="darwin-arm64"
          elif [ "$PLATFORM" = "macos-x64" ]; then
            ARCH="darwin-x64"
          else
            ARCH="linux-x64"
          fi

          curl -LO "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-${ARCH}.tar.gz"
          tar -xzf "node-v${NODE_VERSION}-${ARCH}.tar.gz"
          mkdir -p bundle/node
          mv node-v${NODE_VERSION}-${ARCH}/* bundle/node/

      - name: Debug: List files (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Write-Host "=== openclaw dir ==="
          if (Test-Path openclaw) { Get-ChildItem openclaw | Select-Object Name, Length } else { Write-Host "openclaw NOT FOUND" }
          Write-Host "=== node dir ==="
          if (Test-Path node) { Get-ChildItem node | Select-Object Name, Length } else { Write-Host "node NOT FOUND" }

      - name: Create bundle (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        env:
          VERSION: ${{ steps.version.outputs.version }}
          NODE_VERSION: ${{ steps.version.outputs.node_version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          # 先创建目标目录
          New-Item -ItemType Directory -Path bundle/openclaw -Force | Out-Null
          New-Item -ItemType Directory -Path bundle/node -Force | Out-Null

          # 用 PowerShell 复制目录（排除 .git）
          Copy-Item -Path "openclaw\*" -Destination "bundle/openclaw\" -Recurse -Force -Exclude ".git"

          # 复制 node
          Copy-Item -Path "node" -Destination "bundle/" -Recurse -Force

          # 验证文件数量
          $openclawCount = (Get-ChildItem -Path bundle/openclaw -Recurse -File).Count
          Write-Host "OpenClaw files copied: $openclawCount"
          if ($openclawCount -lt 1000) {
            Write-Host "WARNING: Less than 1000 files copied!"
          }

          # 创建启动脚本
          $batContent = @"
          @echo off
          chcp 65001 >nul
          setlocal
          set "SCRIPT_DIR=%~dp0"
          set "NODE_PATH=%SCRIPT_DIR%node"
          set "PATH=%NODE_PATH%;%PATH%"
          cd /d "%SCRIPT_DIR%openclaw"
          echo Starting OpenClaw...
          "%SCRIPT_DIR%node\node.exe" openclaw.mjs gateway run --port 18789 --allow-unconfigured %*
          "@
          $batContent | Out-File -FilePath bundle/start.bat -Encoding utf8

          # 创建版本文件
          "openclaw: ${VERSION}" | Out-File -FilePath bundle/VERSION -Encoding utf8
          "node: ${NODE_VERSION}" | Add-Content -Path bundle/VERSION
          "platform: ${PLATFORM}" | Add-Content -Path bundle/VERSION
          "build_date: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" | Add-Content -Path bundle/VERSION

      - name: Create bundle (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          NODE_VERSION: ${{ steps.version.outputs.node_version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          # 复制 OpenClaw（排除 .git 目录以减小体积）
          mkdir -p bundle/openclaw
          rsync -av --exclude='.git' openclaw/ bundle/openclaw/

          # 创建启动脚本
          cat > bundle/start.sh << 'BASHSCRIPT'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          export PATH="$SCRIPT_DIR/node/bin:$PATH"
          cd "$SCRIPT_DIR/openclaw"
          echo "Starting OpenClaw..."
          "$SCRIPT_DIR/node/bin/node" openclaw.mjs gateway run --port 18789 --allow-unconfigured "$@"
          BASHSCRIPT
          chmod +x bundle/start.sh

          # 创建版本文件
          echo "openclaw: ${VERSION}" > bundle/VERSION
          echo "node: ${NODE_VERSION}" >> bundle/VERSION
          echo "platform: ${PLATFORM}" >> bundle/VERSION
          echo "build_date: $(date '+%Y-%m-%d %H:%M:%S')" >> bundle/VERSION

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          Compress-Archive -Path "bundle\*" -DestinationPath "openclaw-${PLATFORM}-${VERSION}.zip" -Force

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          cd bundle
          tar -czvf "../openclaw-${PLATFORM}-${VERSION}.tar.gz" *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-${{ matrix.platform }}
          path: |
            openclaw-${{ matrix.platform }}-*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List files
        run: ls -lah artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
          VERSION: ${{ github.event.inputs.version || inputs.version || '2026.3.8' }}
        run: |
          TAG="openclaw-v${VERSION}"

          gh release view "${TAG}" --repo Leo0704/lobster-releases >/dev/null 2>&1 || \
          gh release create "${TAG}" \
            --repo Leo0704/lobster-releases \
            --title "OpenClaw ${VERSION} 离线包" \
            --notes "## OpenClaw ${VERSION} 离线安装包

          内置 Node.js 运行时，无需安装任何依赖。

          ## 下载

          | 平台 | 文件 |
          |------|------|
          | Windows x64 | \`openclaw-win-x64-${VERSION}.zip\` |
          | macOS ARM64 (M1/M2/M3) | \`openclaw-macos-arm64-${VERSION}.tar.gz\` |
          | Linux x64 | \`openclaw-linux-x64-${VERSION}.tar.gz\` |

          ## 使用方法

          1. 下载对应平台的压缩包
          2. 解压到任意目录
          3. Windows: 双击 \`start.bat\`
          4. macOS/Linux: 运行 \`./start.sh\`

          ## 龙虾助手用户

          下载后放到**下载目录**，然后在龙虾助手中点击部署即可。
          "

          gh release upload "${TAG}" \
            --repo Leo0704/lobster-releases \
            --clobber \
            artifacts/*
