name: Release Lobster Assistant

on:
  push:
    tags:
      - 'v*'

jobs:
  build-binary:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: node18-macos-arm64
            asset_name: lobster-macos-arm64
          - runner: macos-13
            target: node18-macos-x64
            asset_name: lobster-macos-x64
          - runner: ubuntu-latest
            target: node18-linux-x64
            asset_name: lobster-linux-x64
          - runner: windows-latest
            target: node18-win-x64
            asset_name: lobster-win-x64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/cli/package-lock.json

      - name: Install dependencies
        working-directory: apps/cli
        run: npm ci

      - name: Build TypeScript
        working-directory: apps/cli
        run: npm run build

      - name: Prepare bin directory
        working-directory: apps/cli
        shell: bash
        run: rm -rf bin && mkdir -p bin

      - name: Build binary with pkg
        working-directory: apps/cli
        shell: bash
        run: npx @yao-pkg/pkg dist/index.js --targets "${{ matrix.target }}" --output "bin/${{ matrix.asset_name }}"

      - name: Ensure executable bit on Unix binaries
        if: runner.os != 'Windows'
        working-directory: apps/cli
        shell: bash
        run: chmod +x "bin/${{ matrix.asset_name }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: apps/cli/bin/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-binary

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        shell: bash
        run: ls -lah release-assets

      - name: Create or update release in lobster-releases
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        shell: bash
        run: |
          gh release view "${{ github.ref_name }}" --repo Leo0704/lobster-releases >/dev/null 2>&1 || \
          gh release create "${{ github.ref_name }}" \
            --repo Leo0704/lobster-releases \
            --title "Lobster Assistant ${{ github.ref_name }}" \
            --notes "## 下载
          选择适合你系统的版本：
          - **macOS (Apple Silicon)**: \`lobster-macos-arm64\`
          - **macOS (Intel)**: \`lobster-macos-x64\`
          - **Linux**: \`lobster-linux-x64\`
          - **Windows**: \`lobster-win-x64.exe\`"

          gh release upload "${{ github.ref_name }}" \
            --repo Leo0704/lobster-releases \
            --clobber \
            release-assets/lobster-macos-arm64 \
            release-assets/lobster-macos-x64 \
            release-assets/lobster-linux-x64 \
            release-assets/lobster-win-x64.exe
